server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files normally
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }

    # Proxy FHIR R4 — strip /api/fhir prefix, pass full HAPI path
    location /api/fhir/ {
        proxy_pass         http://hapi-r4:8080/hapi-fhir-jpaserver/fhir/;
        proxy_http_version 1.1;
        proxy_set_header   Host hapi-r4:8080;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Accept "application/json";
        proxy_read_timeout 60s;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy n8n webhooks
    location /api/n8n/ {
        proxy_pass  http://n8n-cds:4014/;
        proxy_http_version 1.1;
        proxy_set_header   Host n8n-cds:4014;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Content-Type "application/json";
        proxy_read_timeout 60s;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

