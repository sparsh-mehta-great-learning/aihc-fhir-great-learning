volumes:
  r2-database:
  r3-database:
  r4-database:
  n8n-data:

services:

  r2:
    container_name: hapi-r2
    image: ${R2_IMAGE}
    environment:
      - PORT=${R2_PORT}
      - HOST=${HOST}
    ports:
      - "${R2_PORT}:8080"
    volumes:
      - "r2-database:/usr/local/tomcat/target/database"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        envsubst < /tmp/hapi.properties.tpl > /config/hapi.properties
        envsubst < /tmp/server.xml > /usr/local/tomcat/conf/server.xml
        exec /usr/local/tomcat/bin/catalina.sh run

  r3:
    container_name: hapi-r3
    image: ${R3_IMAGE}
    environment:
      - PORT=${R3_PORT}
      - HOST=${HOST}
    ports:
      - "${R3_PORT}:8080"
    volumes:
      - "r3-database:/usr/local/tomcat/target/database"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        envsubst < /tmp/hapi.properties.tpl > /config/hapi.properties
        envsubst < /tmp/server.xml > /usr/local/tomcat/conf/server.xml
        exec /usr/local/tomcat/bin/catalina.sh run

  r4:
    container_name: hapi-r4
    image: ${R4_IMAGE}
    environment:
      - PORT=${R4_PORT}
      - HOST=${HOST}
    ports:
      - "${R4_PORT}:8080"
    volumes:
      - "r4-database:/usr/local/tomcat/target/database"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        envsubst < /tmp/hapi.properties.tpl > /config/hapi.properties
        envsubst < /tmp/server.xml > /usr/local/tomcat/conf/server.xml
        exec /usr/local/tomcat/bin/catalina.sh run

  fhir-viewer:
    container_name: fhir-viewer
    image: smartonfhir/fhir-viewer
    ports:
      - "${FHIR_VIEWER_PORT}:80"

  patient-browser:
    container_name: patient-browser
    image: smartonfhir/patient-browser:latest
    volumes:
      - ./patient-browser:/usr/share/nginx/html/config
    environment:
      - HOST=${HOST}
      - FHIR_VIEWER_PORT=${FHIR_VIEWER_PORT}
      - R2_PORT=${R2_PORT}
      - R3_PORT=${R3_PORT}
      - R4_PORT=${R4_PORT}
    ports:
      - "${PATIENT_BROWSER_PORT}:80"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        envsubst < /usr/share/nginx/html/config/r2.tpl > /usr/share/nginx/html/config/r2-local.json5
        envsubst < /usr/share/nginx/html/config/r3.tpl > /usr/share/nginx/html/config/r3-local.json5
        envsubst < /usr/share/nginx/html/config/r4.tpl > /usr/share/nginx/html/config/r4-local.json5
        nginx -g 'daemon off;'

  index:
    container_name: home-page
    image: nginx:alpine
    volumes:
      - ./www:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${CONTROL_PANEL_PORT}:80"
    environment:
      - HOST=${HOST}
      - R2_PORT=${R2_PORT}
      - R3_PORT=${R3_PORT}
      - R4_PORT=${R4_PORT}
      - R2_ENABLED=${R2_ENABLED}
      - R3_ENABLED=${R3_ENABLED}
      - R4_ENABLED=${R4_ENABLED}
      - PATIENT_BROWSER_PORT=${PATIENT_BROWSER_PORT}
      - FHIR_VIEWER_PORT=${FHIR_VIEWER_PORT}
      - LAUNCHER_PORT=${LAUNCHER_PORT}
      - LAUNCHER_ENABLED=${LAUNCHER_ENABLED}
      - PATIENT_BROWSER_ENABLED=${PATIENT_BROWSER_ENABLED}
      - FHIR_VIEWER_ENABLED=${FHIR_VIEWER_ENABLED}
      - N8N_PORT=${N8N_PORT}
      - N8N_ENABLED=${N8N_ENABLED}
      - ISSUES_URL=https://github.com/smart-on-fhir/smart-dev-sandbox/issues
    depends_on:
      - r4
      - n8n
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        envsubst < /usr/share/nginx/html/template.html > /usr/share/nginx/html/index.html
        nginx -g 'daemon off;'

  smart-launcher:
    container_name: launcher
    image: smartonfhir/smart-launcher:latest
    environment:
      - HOST=${HOST}
      - NODE_ENV=production
      - LAUNCHER_BASE_URL=http://${HOST}:${LAUNCHER_PORT}
      - BASE_URL=http://${HOST}:${LAUNCHER_PORT}
      - FHIR_SERVER_R2=http://${HOST}:${R2_PORT}/hapi-fhir-jpaserver/fhir
      - FHIR_SERVER_R3=http://${HOST}:${R3_PORT}/hapi-fhir-jpaserver/fhir
      - FHIR_SERVER_R4=http://${HOST}:${R4_PORT}/hapi-fhir-jpaserver/fhir
      - FHIR_SERVER_R2_INTERNAL=http://r2:8080/hapi-fhir-jpaserver/fhir
      - FHIR_SERVER_R3_INTERNAL=http://r3:8080/hapi-fhir-jpaserver/fhir
      - FHIR_SERVER_R4_INTERNAL=http://r4:8080/hapi-fhir-jpaserver/fhir
      - DISABLE_SANDBOXES=1
      - CDS_SANDBOX_URL=https://sandbox.cds-hooks.org
      - PICKER_CONFIG_R2=r2-local
      - PICKER_CONFIG_R3=r3-local
      - PICKER_CONFIG_R4=r4-local
      - PICKER_ORIGIN=http://${HOST}:${PATIENT_BROWSER_PORT}
      - STU2_ENABLED=${R2_ENABLED}
      - STU3_ENABLED=${R3_ENABLED}
      - STU4_ENABLED=${R4_ENABLED}
    ports:
      - "${LAUNCHER_PORT}:80"

  # ============================================================
  # Clinical Decision Support â€” n8n Workflow Engine
  # ============================================================
  # n8n receives CDS Hooks calls from the SMART launcher / EHR
  # simulator, fetches patient data from the HAPI FHIR servers,
  # runs AI-powered rule evaluation, and returns CDS cards.
  #
  # Webhook base URL:  http://<HOST>:<N8N_PORT>/webhook/
  # CDS Hooks prefix:  http://<HOST>:<N8N_PORT>/webhook/cds-hook
  #
  # To wire up a CDS Hook in the launcher, set the CDS service
  # URL to:  http://<HOST>:<N8N_PORT>/webhook/cds-hook
  # ============================================================
  n8n:
    container_name: n8n-cds
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=${HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${HOST}:${N8N_PORT}/
      # Pre-configure FHIR server base URLs as environment variables
      # so workflow nodes can reference them via $env variables
      - FHIR_R4_BASE=http://${HOST}:${R4_PORT}/hapi-fhir-jpaserver/fhir
      - FHIR_R3_BASE=http://${HOST}:${R3_PORT}/hapi-fhir-jpaserver/fhir
      - FHIR_R2_BASE=http://${HOST}:${R2_PORT}/hapi-fhir-jpaserver/fhir
      # Internal Docker-network addresses (faster, no port exposure needed)
      - FHIR_R4_INTERNAL=http://r4:8080/hapi-fhir-jpaserver/fhir
      - FHIR_R3_INTERNAL=http://r3:8080/hapi-fhir-jpaserver/fhir
      - FHIR_R2_INTERNAL=http://r2:8080/hapi-fhir-jpaserver/fhir
      # Disable telemetry for dev use
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Basic auth (change credentials before any non-local deployment!)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
    ports:
      - "${N8N_PORT}:${N8N_PORT}"
    volumes:
      - n8n-data:/home/node/.n8n
      # Mount optional pre-built workflow JSON files from the host
      - ./n8n-workflows:/home/node/.n8n/workflows
    depends_on:
      - r4
      - r3
      - r2